{% extends 'store/base.html' %}

<div class="card shadow-sm p-4 border-0 rounded-3">
<h3 class="mb-4">Gerir Banda Desenhada</h3>
<form method="post" enctype="multipart/form-data">

{{ form.as_p }}

</form>
</div>
</div>
</div>
{% endblock %}
