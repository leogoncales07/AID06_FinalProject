<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic Store Manager</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
<div class="container">
<a class="navbar-brand fw-bold" href="{% url 'product_list' %}">Comic Store</a>
<div class="navbar-nav ms-auto align-items-center">
<a class="nav-item nav-link me-3" href="{% url 'view_cart' %}">Carrinho</a>
{% if user.is_authenticated %}
<a class="nav-item nav-link me-3 text-warning" href="{% url 'dashboard_home' %}">Painel PME</a>
<span class="nav-item nav-link text-light me-3">Ola, {{ user.username }}</span>
<form action="{% url 'logout' %}" method="post" class="d-inline">
{% csrf_token %}
<button type="submit" class="btn btn-outline-danger btn-sm">Sair</button>
</form>
{% else %}
<a class="btn btn-outline-primary btn-sm text-light" href="{% url 'login' %}">Entrar / Registar</a>
{% endif %}
</div>
</div>
</nav>
</div>
</nav>

<div class="container">
{% block content %}
{% endblock %}
</div>

<footer class="text-center mt-5 py-3 text-muted border-top">
<p>&copy; 2026 - Comic Store PME Project</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
